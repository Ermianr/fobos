version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: "bun"
    directory: "/apps/web"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: "bun"
    directory: "/packages/config"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: "bun"
    directory: "/packages/db"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: "bun"
    directory: "/packages/env"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
